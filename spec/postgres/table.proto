syntax = "proto3";

package postgres;

import "postgres/column.proto";
import "postgres/index.proto";
import "core/shared/foreign_key.proto";
import "postgres/check_constraint.proto";
import "postgres/virtual_column.proto";
import "core/shared/virtual_foreign_key.proto";
import "core/shared/relation.proto";

// Table represents a physical database table within a PostgreSQL schema.
// It encapsulates all structural elements, constraints, and relations required 
// to fully generate both the database migrations and the ORM code.
message Table {
  // The physical name of the table as it appears in the database.
  string name = 1;
  
  // The structural columns defined physically within the table.
  repeated Column columns = 2;
  
  // An ordered list of column names that compose the primary key constraint of the table.
  repeated string primary_keys = 3;
  
  // Performance indexes applied to the table.
  repeated Index indexes = 4;
  
  // Strictly enforced referential foreign keys linking to other tables.
  repeated core.shared.ForeignKey foreign_keys = 5;
  
  // Custom check constraints for explicit data validation rules.
  repeated CheckConstraint checks = 6;
  
  // Derived or computed columns, mapped to GENERATED ALWAYS AS or 
  // purely application-level computed fields.
  repeated VirtualColumn virtual_columns = 7;
  
  // Non-enforced relational mappings (virtual foreign keys). Used to instruct 
  // the ORM code generator without creating physical database constraints.
  repeated core.shared.VirtualForeignKey virtual_foreign_keys = 8;
  
  // Pure relational linkages used exclusively for eager-loading and ORM traversal.
  repeated core.shared.Relation relations = 9;
  // The previous name of this object, used to issue RENAME commands instead of DROP/CREATE.
  string name_previous = 10;
}